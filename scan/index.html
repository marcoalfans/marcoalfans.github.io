<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Scan Reveal — Demo</title>
  <link rel="icon" href="../assets/img/toonme.ico">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 22px; padding: 30px; }
    .demo-title { font-family: var(--mono); font-size: 13px; color: var(--muted); text-align: center; }
    .demo-title b { color: var(--accent); }

    .scan {
      position: relative;
      width: 460px; max-width: 92vw;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
      box-shadow: 0 0 44px rgba(0,0,0,.5);
    }
    .scan img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      user-select: none; -webkit-user-drag: none;
    }
    .scan-a { z-index: 1; }                 /* Photo A — full base (avatar) */
    .scan-b {                               /* Photo B — real face, revealed only inside the circle */
      z-index: 2;
      clip-path: circle(80px at 50% 50%);
    }

    .reticle {
      position: absolute; z-index: 3; top: 0; left: 0;
      width: 188px; height: 188px;
      pointer-events: none;
      will-change: transform;
    }
    .reticle .ring {
      position: absolute; inset: 14px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      box-shadow: 0 0 14px rgba(255,68,68,.55), inset 0 0 14px rgba(255,68,68,.25);
    }
    .reticle .ring-dashed {
      position: absolute; inset: 5px;
      border-radius: 50%;
      border: 1.5px dashed rgba(255,68,68,.7);
      animation: retSpin 6s linear infinite;
    }
    .reticle .cx-h, .reticle .cx-v { position: absolute; background: rgba(255,68,68,.85); }
    .reticle .cx-h { left: 50%; top: 50%; width: 34px; height: 1.5px; transform: translate(-50%,-50%); }
    .reticle .cx-v { left: 50%; top: 50%; width: 1.5px; height: 34px; transform: translate(-50%,-50%); }
    .reticle .dot { position: absolute; left: 50%; top: 50%; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); transform: translate(-50%,-50%); box-shadow: 0 0 8px var(--accent); }
    .reticle .br { position: absolute; width: 18px; height: 18px; border: 2px solid var(--accent); }
    .reticle .br.tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
    .reticle .br.tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
    .reticle .br.bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
    .reticle .br.br2 { bottom: 0; right: 0; border-left: 0; border-top: 0; }
    .reticle .sweep { position: absolute; left: 14px; right: 14px; height: 1px; top: 14px;
      background: linear-gradient(90deg, transparent, rgba(255,68,68,.95), transparent);
      animation: retSweep 2.2s ease-in-out infinite; }

    @keyframes retSpin  { to { transform: rotate(1turn); } }
    @keyframes retSweep { 0%,100% { transform: translateY(0); } 50% { transform: translateY(160px); } }

    .hint { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: center; }
  </style>
</head>
<body>
  <p class="demo-title"><b>SCAN REVEAL</b> — di luar lingkaran: avatar (Foto A) · di dalam lingkaran: wajah asli (Foto B)</p>

  <div class="scan" id="scan">
    <img class="scan-a" id="imgA" src="../assets/img/PhotoA.png" alt="Avatar">
    <img class="scan-b" id="imgB" src="../assets/img/PhotoB.jpeg" alt="Real">
    <div class="reticle" id="reticle">
      <span class="ring"></span>
      <span class="ring-dashed"></span>
      <span class="sweep"></span>
      <span class="cx-h"></span>
      <span class="cx-v"></span>
      <span class="dot"></span>
      <span class="br tl"></span><span class="br tr"></span>
      <span class="br bl"></span><span class="br br2"></span>
    </div>
  </div>

  <p class="hint">Gerak otomatis (auto-scan). Bisa juga dibuat mengikuti kursor / lock saat di-hover.</p>

  <script>
    (function () {
      const scan    = document.getElementById('scan');
      const imgB    = document.getElementById('imgB');
      const reticle = document.getElementById('reticle');

      const R    = 80;   // circle radius (matches .scan-b clip-path)
      const HALF = 94;   // half the reticle box (188/2) so its center sits on (mx,my)

      let t = 0;
      function frame() {
        t += 1 / 60;
        const w = scan.clientWidth, h = scan.clientHeight;
        const mx = w / 2 + Math.sin(t * 0.7)  * (w / 2 - R - 14);
        const my = h / 2 + Math.sin(t * 1.13) * (h / 2 - R - 14);

        const clip = `circle(${R}px at ${mx}px ${my}px)`;
        imgB.style.clipPath = clip;
        imgB.style.webkitClipPath = clip;
        reticle.style.transform = `translate(${mx - HALF}px, ${my - HALF}px)`;

        requestAnimationFrame(frame);
      }
      frame();
    })();
  </script>
</body>
</html>
